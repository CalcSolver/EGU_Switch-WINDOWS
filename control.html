<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        h1 { font-size: 18px; margin: 0 0 4px 0; color: #3b82f6; font-weight: 700; }
        p { font-size: 12px; color: #94a3b8; margin: 0 0 20px 0; }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 80px;
            height: 40px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 32px; width: 32px; left: 4px; bottom: 4px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(40px); }

        #link-display {
            margin-top: 15px;
            font-size: 12px;
            font-weight: bold;
            color: #10b981;
            display: none;
            background: rgba(16, 185, 129, 0.1);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px dashed #10b981;
        }
        #error-display {
            margin-top: 12px;
            font-size: 11px;
            color: #ef4444;
            max-width: 90%;
            text-align: center;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>EGU Host Dashboard</h1>
    <p id="status-text">Server Status: Stopped</p>

    <label class="switch">
        <input type="checkbox" id="power-toggle">
        <span class="slider"></span>
    </label>

    <div id="link-display">Stream Link: <span style="text-decoration: underline;">http://localhost:3000</span></div>
    <div id="error-display"></div>

    <script>
        const { ipcRenderer } = require('electron');
        const toggle = document.getElementById('power-toggle');
        const statusText = document.getElementById('status-text');
        const linkDisplay = document.getElementById('link-display');
        const errorDisplay = document.getElementById('error-display');

        toggle.addEventListener('change', () => {
            const targetState = toggle.checked ? 'on' : 'off';
            errorDisplay.style.display = "none"; 
            ipcRenderer.send('toggle-server', targetState);
        });

        ipcRenderer.on('server-status', (event, status) => {
            if (status.running) {
                statusText.innerText = "Server Status: ACTIVE";
                statusText.style.color = "#10b981";
                linkDisplay.style.display = "block";
                errorDisplay.style.display = "none";
            } else {
                statusText.innerText = "Server Status: Stopped";
                statusText.style.color = "#94a3b8";
                linkDisplay.style.display = "none";
                toggle.checked = false;

                if (status.error) {
                    errorDisplay.innerText = status.error;
                    errorDisplay.style.display = "block";
                }
            }
        });
    </script>
</body>
</html>
