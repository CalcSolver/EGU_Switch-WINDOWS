<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGU Interactive Setup Manual</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b0f19; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #f8fafc; }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; box-sizing: border-box; }
        
        #host-ai-panel { background: rgba(15, 23, 42, 0.95); border: 2px solid #3b82f6; border-radius: 16px; display: flex; flex-direction: column; height: 600px; box-shadow: 0 12px 24px rgba(0,0,0,0.6); overflow: hidden; }
        #ai-header { background: linear-gradient(135deg, #1e40af, #3b82f6); color: white; padding: 18px; font-weight: bold; font-size: 16px; border-bottom: 1px solid #1e3a8a; display: flex; align-items: center; gap: 10px; }
        #ai-chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        #ai-input-area { display: flex; border-top: 1px solid #334155; background: #0f172a; padding: 12px; }
        #ai-chat-input { flex: 1; background: #1e293b; border: 1px solid #475569; border-radius: 8px; padding: 12px; color: white; outline: none; font-size: 14px; }
        #ai-chat-input:focus { border-color: #3b82f6; }
        #ai-send-btn { background: #3b82f6; color: white; border: none; padding: 0 24px; margin-left: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        #ai-send-btn:hover { background: #2563eb; }
        #ai-send-btn:disabled { background: #475569; cursor: not-allowed; }
        
        .msg { padding: 12px 16px; border-radius: 10px; max-width: 80%; word-wrap: break-word; line-height: 1.5; font-size: 14px; }
        .msg.ai { background: #1e293b; border-left: 4px solid #3b82f6; align-self: flex-start; }
        .msg.user { background: #2563eb; color: white; align-self: flex-end; }
        .msg.system { background: #334155; align-self: center; font-size: 12px; color: #94a3b8; text-align: center; width: 90%; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="text-align: center; margin-bottom: 20px; font-weight: 800; color: #fff;">🎮 EGU_Switch Setup Center</h1>
        
        <div id="host-ai-panel">
            <div id="ai-header">
                🖥️ Offline GPU-Accelerated Support AI
            </div>
            <div id="ai-chat-messages">
                <div class="msg system" id="ai-status">Loading WebLLM Setup Parameters...</div>
                <div class="msg ai">Hello! I am compiling the WebGPU layers to run locally on your graphics card. You can ask me how to resolve blank screens, map configurations, fix networking blocks, or install necessary packages.</div>
            </div>
            <div id="ai-input-area">
                <input id="ai-chat-input" type="text" placeholder="Booting AI core model..." disabled>
                <button id="ai-send-btn" disabled>Ask AI</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

        const aiSend = document.getElementById('ai-send-btn');
        const aiInput = document.getElementById('ai-chat-input');
        const aiMessages = document.getElementById('ai-chat-messages');
        const aiStatus = document.getElementById('ai-status');

        let engine = null;
        
        const conversationHistory = [
            { 
                role: "system", 
                content: "You are a specialized technical assistant running locally on the host machine. You are ONLY allowed to answer questions about how to set up, install, optimize, run, or troubleshoot EGU (EGU_Switch). If the user asks about anything else, politely remind them that you can only answer questions about using EGU." 
            }
        ];

        async function initHostAI() {
            try {
                const model = "Llama-3.2-3B-Instruct-q4f32_1-MLC";
                engine = await CreateMLCEngine(model, {
                    initProgressCallback: (info) => {
                        aiStatus.innerText = info.text; 
                    }
                });
                aiStatus.innerText = "⚙️ Local AI Engine Ready";
                aiInput.disabled = false;
                aiSend.disabled = false;
                aiInput.placeholder = "Ask a setup or configuration question...";
            } catch (err) {
                aiStatus.innerText = "❌ WebGPU initialization failed. Check your browser GPU flags.";
                console.error(err);
            }
        }

        function appendMessage(sender, text, roleClass) {
            const msg = document.createElement('div');
            msg.className = `msg ${roleClass}`;
            msg.innerHTML = `<strong>${sender}:</strong> ${text}`;
            aiMessages.appendChild(msg);
            aiMessages.scrollTop = aiMessages.scrollHeight;
        }

        async function handleHostQuery() {
            const query = aiInput.value.trim();
            if (!query || !engine) return;

            appendMessage('You', query, 'user');
            aiInput.value = '';
            aiInput.disabled = true;
            aiSend.disabled = true;

            conversationHistory.push({ role: "user", content: query });

            try {
                const reply = await engine.chat.completions.create({
                    messages: conversationHistory
                });

                const aiReplyText = reply.choices[0].message.content;
                appendMessage('AI', aiReplyText, 'ai');
                conversationHistory.push({ role: "assistant", content: aiReplyText });
            } catch (e) {
                appendMessage('System', 'Local AI calculation timeout.', 'system');
            }

            aiInput.disabled = false;
            aiSend.disabled = false;
            aiInput.focus();
        }

        aiSend.addEventListener('click', handleHostQuery);
        aiInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleHostQuery(); });

        initHostAI();
    </script>
</body>
</html>
