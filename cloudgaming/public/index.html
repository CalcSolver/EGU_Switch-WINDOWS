<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EGU Stream Interface</title>
    <style>
        body { background-color: #0b0f19; color: #f1f5f9; font-family: system-ui, sans-serif; text-align: center; padding: 50px; }
        .container { background: #111827; border: 1px solid #1f2937; padding: 40px; border-radius: 16px; display: inline-block; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        h1 { color: #3b82f6; margin-bottom: 5px; }
        .status { color: #10b981; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>EGU Controller Node</h1>
        <div class="status">● CONNECTION PIPELINE SECURE</div>
        <p>Your inputs on this screen are tracking directly to the host application environment.</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io({ transports: ['websocket'] });
        
        // Simple verification link listener
        window.addEventListener('click', () => {
            socket.emit('mouse-click');
        });
    </script>
</body>
</html>
