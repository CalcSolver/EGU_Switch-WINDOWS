<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EGU Stream Screen</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; user-select: none; }
        #stream-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 5; background: #000; }
        img { width: 100%; height: 100%; object-fit: fill; background: #000; }
        #interaction-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: crosshair; }
        
        /* Gamepad Overlay */
        #gamepad-overlay { position: absolute; bottom: 30px; right: 30px; z-index: 50; display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 8px; }
        .dpad-btn { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.2); border: 2px solid #fff; border-radius: 50%; color: white; font-weight: bold; display: flex; justify-content: center; align-items: center; }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-space { grid-column: 2; grid-row: 2; border-radius: 10px; font-size: 11px; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>

    <div id="gamepad-overlay">
        <button id="btn-up" class="dpad-btn">▲</button>
        <button id="btn-left" class="dpad-btn">◀</button>
        <button id="btn-space" class="dpad-btn">SPACE</button>
        <button id="btn-right" class="dpad-btn">▶</button>
        <button id="btn-down" class="dpad-btn">▼</button>
    </div>

    <div id="interaction-layer"></div>

    <div id="stream-container">
        <img id="view-screen" alt="Connecting to High-Speed Stream..." />
    </div>

    <script>
        const socket = io({ transports: ['websocket'] });
        const viewScreen = document.getElementById('view-screen');
        const clickLayer = document.getElementById('interaction-layer');
        let oldUrl = null;

        socket.on('screen-frame', (arrayBuffer) => {
            const blob = new Blob([arrayBuffer], { type: 'image/jpeg' });
            const url = URL.createObjectURL(blob);
            viewScreen.src = url;
            if (oldUrl) URL.revokeObjectURL(oldUrl);
            oldUrl = url;
        });

        const sendCoords = (clientX, clientY) => {
            const rect = viewScreen.getBoundingClientRect();
            const percentX = (clientX - rect.left) / rect.width;
            const percentY = (clientY - rect.top) / rect.height;

            if (percentX >= 0 && percentX <= 1 && percentY >= 0 && percentY <= 1) {
                const targetX = percentX * 1920; 
                const targetY = percentY * 1080;
                socket.emit('mouse-move', { x: targetX, y: targetY });
            }
        };

        clickLayer.addEventListener('mousemove', (e) => sendCoords(e.clientX, e.clientY));
        clickLayer.addEventListener('click', (e) => {
            sendCoords(e.clientX, e.clientY);
            socket.emit('mouse-click');
        });

        clickLayer.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                sendCoords(e.touches[0].clientX, e.touches[0].clientY);
                socket.emit('mouse-down');
            }
        });
        clickLayer.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) sendCoords(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });
        clickLayer.addEventListener('touchend', () => { socket.emit('mouse-up'); });

        const linkKey = (id, actualKey) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); socket.emit('key-down', { key: actualKey }); });
            el.addEventListener('touchend', (e) => { e.preventDefault(); socket.emit('key-up', { key: actualKey }); });
        };
        linkKey('btn-up', 'up');
        linkKey('btn-down', 'down');
        linkKey('btn-left', 'left');
        linkKey('btn-right', 'right');
        linkKey('btn-space', 'space');

        document.addEventListener('keydown', (e) => { socket.emit('key-down', { key: e.key }); });
        document.addEventListener('keyup', (e) => { socket.emit('key-up', { key: e.key }); });
    </script>
</body>
</html>
