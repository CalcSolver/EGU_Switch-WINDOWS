<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EGU Cloud Play</title>
    <style>
        body { background-color: #0b0f19; color: #f1f5f9; font-family: system-ui, sans-serif; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #stream-canvas { max-width: 100%; max-height: 100vh; background: #000; cursor: none; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <canvas id="stream-canvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io({ transports: ['websocket'] });
        const canvas = document.getElementById('stream-canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();

        // Handle incoming screen frames
        socket.on('screen-frame', (base64Data) => {
            img.src = 'data:image/jpeg;base64,' + base64Data;
        });

        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
        };

        // Capture Mouse Movement relative to screen size
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            socket.emit('mouse-move', { x, y });
        });

        canvas.addEventListener('mousedown', () => socket.emit('mouse-click'));

        // Capture Keyboard Inputs
        window.addEventListener('keydown', (e) => {
            socket.emit('key-down', { key: e.key });
        });
        window.addEventListener('keyup', (e) => {
            socket.emit('key-up', { key: e.key });
        });
    </script>
</body>
</html>
